<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SkinSynth | Партнерская программа</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(145deg, #0c0f15 0%, #06080c 100%);
            font-family: 'Inter', sans-serif;
            color: #eef2ff;
            min-height: 100vh;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px 24px;
        }
        .partner-header {
            text-align: center;
            margin-bottom: 40px;
        }
        .partner-header h1 {
            font-size: 2.5rem;
            background: linear-gradient(135deg, #fff, #2dd4bf);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .register-form {
            background: rgba(18, 24, 34, 0.6);
            border-radius: 28px;
            padding: 32px;
            border: 1px solid rgba(45,212,191,0.3);
            max-width: 500px;
            margin: 0 auto;
        }
        .register-form h2 {
            margin-bottom: 24px;
            color: #2dd4bf;
        }
        .register-form input {
            width: 100%;
            background: #0f1420;
            border: 1px solid #2c3e50;
            padding: 14px 18px;
            border-radius: 28px;
            color: white;
            margin-bottom: 20px;
            font-size: 1rem;
        }
        .register-form input:focus {
            border-color: #2dd4bf;
            outline: none;
        }
        .register-form button {
            width: 100%;
            background: linear-gradient(95deg, #2dd4bf, #1e9b8a);
            border: none;
            padding: 14px;
            border-radius: 40px;
            font-weight: bold;
            color: #0a0f1a;
            cursor: pointer;
            font-size: 1rem;
        }
        .register-form button:hover {
            transform: scale(0.98);
        }
        .back-link {
            display: block;
            text-align: center;
            margin-top: 20px;
            color: #2dd4bf;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="partner-header">
            <h1>🤝 Партнерская программа SkinSynth</h1>
            <p>Зарабатывайте вместе с нами!</p>
        </div>
        <div class="register-form">
            <h2>Регистрация партнера</h2>
            <input type="text" id="partnerName" placeholder="Ваше имя">
            <input type="email" id="partnerEmail" placeholder="Email">
            <input type="text" id="partnerSteam" placeholder="Steam ID">
            <button id="registerPartnerBtn">Зарегистрироваться</button>
            <a class="back-link" onclick="window.close()">Закрыть окно</a>
        </div>
    </div>
    <script>
        document.getElementById('registerPartnerBtn').addEventListener('click', function() {
            const name = document.getElementById('partnerName').value;
            const email = document.getElementById('partnerEmail').value;
            const steam = document.getElementById('partnerSteam').value;
            if (name && email && steam) {
                alert('Заявка отправлена! Наш менеджер свяжется с вами в ближайшее время.');
                window.close();
            } else {
                alert('Пожалуйста, заполните все поля');
            }
        });
    </script>
</body>
</html>
